<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Promo tile 440x280</title>
    <style>
      @font-face {
        font-family: 'Workbench';
        src: url('../popup/fonts/Workbench-400.ttf') format('truetype');
      }
      @font-face {
        font-family: 'Spline Sans Mono';
        font-weight: 400;
        src: url('../popup/fonts/SplineSansMono-400.ttf') format('truetype');
      }
      @font-face {
        font-family: 'Spline Sans Mono';
        font-weight: 500;
        src: url('../popup/fonts/SplineSansMono-500.ttf') format('truetype');
      }
      html, body { margin: 0; padding: 0; }
      body {
        width: 440px;
        height: 280px;
        background:
          radial-gradient(ellipse at 25% 30%, rgba(136, 224, 156, 0.16) 0%, transparent 60%),
          linear-gradient(180deg, #07090a 0%, #03050a 100%);
        color: #f0ebd8;
        font-family: 'Spline Sans Mono', ui-monospace, Menlo, monospace;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        padding: 0 28px;
      }
      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.014) 0px,
          rgba(255, 255, 255, 0.014) 1px,
          transparent 1px,
          transparent 3px
        );
        pointer-events: none;
      }
      .wrap { position: relative; z-index: 1; }
      .eyebrow {
        font-size: 9px;
        letter-spacing: 0.32em;
        color: #88e09c;
        text-transform: uppercase;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }
      .eyebrow::before {
        content: '';
        width: 6px;
        height: 6px;
        background: #88e09c;
        border-radius: 50%;
        box-shadow: 0 0 10px #88e09c;
      }
      h1 {
        font-family: 'Workbench', monospace;
        font-weight: 400;
        font-size: 40px;
        line-height: 1.0;
        letter-spacing: 0.03em;
        margin: 0;
        text-shadow: 0 0 16px rgba(136, 224, 156, 0.2);
      }
      .accent { color: #88e09c; }
      .tag {
        font-size: 11px;
        color: #d8d6c8;
        margin-top: 14px;
        letter-spacing: 0.04em;
        line-height: 1.4;
      }
      .corner {
        position: absolute;
        width: 14px;
        height: 14px;
        border-color: #3a3e38;
      }
      .c-tl { top: 6px; left: 6px; border-top: 1px solid #3a3e38; border-left: 1px solid #3a3e38; }
      .c-br { bottom: 6px; right: 6px; border-bottom: 1px solid #3a3e38; border-right: 1px solid #3a3e38; }
    </style>
  </head>
  <body>
    <div class="corner c-tl"></div>
    <div class="corner c-br"></div>
    <div class="wrap">
      <div class="eyebrow">FOR SEARCH CONSOLE</div>
      <h1>BULK<br /><span class="accent">REQUEST&nbsp;INDEX</span></h1>
      <div class="tag">Paste a sitemap. Click EXEC. Walk away.</div>
    </div>
  </body>
</html>
